<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Blood | BloodCare</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-wrapper {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .urgency-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .urgency-option {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .urgency-option:hover {
            border-color: #dc2626;
        }

        .urgency-option.low {
            background: #dbeafe;
            border-color: #3b82f6;
        }

        .urgency-option.medium {
            background: #fef3c7;
            border-color: #f59e0b;
        }

        .urgency-option.high {
            background: #fed7aa;
            border-color: #f97316;
        }

        .urgency-option.critical {
            background: #fecaca;
            border-color: #dc2626;
        }

        .urgency-option input {
            display: none;
        }

        .urgency-option input:checked + label {
            color: white;
            font-weight: 700;
        }

        .blood-group-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .blood-option {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            font-weight: 600;
        }

        .blood-option:hover {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .blood-option input {
            display: none;
        }

        .blood-option input:checked + label {
            background: #dc2626;
            color: white;
            border-radius: 8px;
            padding: 8px 12px;
            display: block;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
        }

        .btn-cancel {
            background: #e5e7eb;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d1d5db;
        }

        .priority-message {
            background: #f0fdf4;
            border: 2px solid #86efac;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            color: #15803d;
            font-size: 13px;
            line-height: 1.6;
        }

        .priority-message strong {
            display: block;
            margin-bottom: 8px;
        }

        @media (max-width: 600px) {
            .form-row,
            .button-group,
            .urgency-selector,
            .blood-group-selector {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .form-wrapper {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🩸 Request Blood</h1>
        <p>Help us find the blood you need. Based on donor history, previous donors get priority!</p>
    </div>

    <div class="form-wrapper">
        <div class="priority-message">
            <strong>⭐ Priority System Active!</strong>
            Previous blood donors in your area will be prioritized and notified first when they match your blood type.
        </div>

        <form id="bloodRequestForm">
            <!-- Patient Name -->
            <div class="form-group">
                <label>📋 Patient Name *</label>
                <input type="text" id="patientName" required placeholder="Full name of patient">
            </div>

            <!-- Blood Group Selection -->
            <div class="form-group">
                <label>🩸 Blood Group Required *</label>
                <div class="blood-group-selector">
                    <div class="blood-option">
                        <input type="radio" id="blood_ap" name="bloodGroup" value="A+" required>
                        <label for="blood_ap">A+</label>
                    </div>
                    <div class="blood-option">
                        <input type="radio" id="blood_am" name="bloodGroup" value="A-">
                        <label for="blood_am">A-</label>
                    </div>
                    <div class="blood-option">
                        <input type="radio" id="blood_bp" name="bloodGroup" value="B+">
                        <label for="blood_bp">B+</label>
                    </div>
                    <div class="blood-option">
                        <input type="radio" id="blood_bm" name="bloodGroup" value="B-">
                        <label for="blood_bm">B-</label>
                    </div>
                    <div class="blood-option">
                        <input type="radio" id="blood_abp" name="bloodGroup" value="AB+">
                        <label for="blood_abp">AB+</label>
                    </div>
                    <div class="blood-option">
                        <input type="radio" id="blood_abm" name="bloodGroup" value="AB-">
                        <label for="blood_abm">AB-</label>
                    </div>
                    <div class="blood-option">
                        <input type="radio" id="blood_op" name="bloodGroup" value="O+">
                        <label for="blood_op">O+</label>
                    </div>
                    <div class="blood-option">
                        <input type="radio" id="blood_om" name="bloodGroup" value="O-">
                        <label for="blood_om">O-</label>
                    </div>
                </div>
            </div>

            <!-- Units and Urgency -->
            <div class="form-row">
                <div class="form-group">
                    <label>📊 Units Required *</label>
                    <input type="number" id="unitsRequired" min="1" max="10" required placeholder="e.g., 2">
                </div>
                <div class="form-group">
                    <label>⏰ Urgency Level *</label>
                    <select id="urgency" required>
                        <option value="">Select urgency</option>
                        <option value="LOW">🟢 Low (Non-urgent)</option>
                        <option value="MEDIUM">🟡 Medium (Within 48 hours)</option>
                        <option value="HIGH">🟠 High (Within 24 hours)</option>
                        <option value="CRITICAL">🔴 Critical (Within hours)</option>
                    </select>
                </div>
            </div>

            <!-- Hospital and Contact -->
            <div class="form-row">
                <div class="form-group">
                    <label>🏥 Hospital Name *</label>
                    <input type="text" id="hospital" required placeholder="Hospital name">
                </div>
                <div class="form-group">
                    <label>📍 City *</label>
                    <input type="text" id="city" required placeholder="City">
                </div>
            </div>

            <!-- Contact Number -->
            <div class="form-group">
                <label>📞 Contact Number *</label>
                <input type="tel" id="contactNumber" required placeholder="Your contact number">
            </div>

            <!-- Description -->
            <div class="form-group">
                <label>📝 Medical Details / Reason</label>
                <textarea id="description" placeholder="Brief description of medical condition (optional)"></textarea>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn btn-submit">🩸 Submit Request</button>
                <button type="button" class="btn btn-cancel" onclick="window.history.back()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('bloodRequestForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const request = {
            patientName: document.getElementById('patientName').value,
            bloodGroup: document.getElementById('bloodGroup').value,
            unitsRequired: parseInt(document.getElementById('unitsRequired').value),
            hospital: document.getElementById('hospital').value,
            city: document.getElementById('city').value,
            contactNumber: document.getElementById('contactNumber').value,
            urgency: document.getElementById('urgency').value,
            description: document.getElementById('description').value
        };

        try {
            const response = await fetch('/api/blood-request/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify(request)
            });

            const data = await response.json();

            if (data.success) {
                if (typeof localShow === 'function') localShow(data.message, 'success'); else alert(data.message);
                window.location.href = '/donor-dashboard';
            } else {
                if (typeof localShow === 'function') localShow('Error: ' + (data.message || 'Failed to create request'), 'error'); else alert('Error: ' + (data.message || 'Failed to create request'));
            }
        } catch (error) {
            if (typeof localShow === 'function') localShow('Error: ' + error.message, 'error'); else alert('Error: ' + error.message);
        }
    });

    // Get blood group from URL param if needed
    document.querySelectorAll('.blood-option input').forEach(input => {
        input.addEventListener('change', function() {
            document.querySelectorAll('.blood-option').forEach(opt => {
                opt.style.background = 'white';
            });
            if (this.checked) {
                this.parentElement.style.background = '#fef2f2';
            }
        });
    });
</script>
<script th:src="@{/js/toast.js}"></script>

<!-- Chatbot Widget -->
<script th:src="@{/js/chatbot-widget.js}"></script>

</body>
</html>
