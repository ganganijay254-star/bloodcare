<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Certificate Verification | BloodCare</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(202, 90, 70, 0.22), transparent 22rem),
                radial-gradient(circle at bottom right, rgba(138, 36, 49, 0.18), transparent 20rem),
                linear-gradient(180deg, #fffaf7 0%, #f7ece5 100%);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: #1d2535;
        }

        .verify-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }

        .verify-card {
            width: min(100%, 760px);
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(93, 24, 33, 0.12);
            border-radius: 1.75rem;
            box-shadow: 0 28px 70px rgba(29, 37, 53, 0.16);
            overflow: hidden;
            backdrop-filter: blur(14px);
        }

        .verify-banner {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem 1.25rem;
            background: linear-gradient(135deg, #2b7d58, #235f45);
            color: #fff;
            font-weight: 700;
        }

        .verify-banner--error {
            background: linear-gradient(135deg, #c04a3d, #8a2431);
        }

        .verify-banner__icon {
            width: 2rem;
            height: 2rem;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.16);
            font-size: 1rem;
            flex-shrink: 0;
        }

        .verify-body {
            padding: 1.5rem;
        }

        .verify-eyebrow {
            color: #8a2431;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .verify-title {
            margin: 0.55rem 0 0.9rem;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            line-height: 0.98;
            color: #5d1821;
        }

        .verify-copy {
            color: #566278;
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 1.4rem;
        }

        .verify-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .verify-item {
            padding: 1rem;
            border-radius: 1.1rem;
            background: #fff;
            border: 1px solid rgba(93, 24, 33, 0.1);
        }

        .verify-label {
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #8a2431;
            margin-bottom: 0.45rem;
        }

        .verify-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: #1d2535;
            word-break: break-word;
        }

        .verify-note {
            margin-top: 1.3rem;
            padding: 1rem 1.1rem;
            border-radius: 1rem;
            background: rgba(43, 125, 88, 0.08);
            border: 1px solid rgba(43, 125, 88, 0.14);
            color: #235f45;
            font-weight: 600;
        }

        .verify-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .verify-actions .btn,
        .verify-actions .btn-outline {
            flex: 1 1 0;
        }

        .verify-loading,
        .verify-error {
            text-align: center;
            padding: 2rem 1rem;
        }

        .verify-spinner {
            width: 3rem;
            height: 3rem;
            margin: 0 auto 1rem;
            border-radius: 999px;
            border: 4px solid rgba(138, 36, 49, 0.15);
            border-top-color: #8a2431;
            animation: spin 0.85s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .verify-shell {
                padding: 1rem;
            }

            .verify-body {
                padding: 1.2rem;
            }

            .verify-grid {
                grid-template-columns: 1fr;
            }

            .verify-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="verify-shell">
    <main class="verify-card">
        <div id="verifyBanner" class="verify-banner">
            <span class="verify-banner__icon">OK</span>
            <span id="verifyBannerText">Valid certificate located</span>
        </div>

        <div id="verifyRoot" class="verify-body">
            <div class="verify-loading">
                <div class="verify-spinner"></div>
                <h2>Checking certificate</h2>
                <p>Please wait while we verify this BloodCare donation certificate.</p>
            </div>
        </div>
    </main>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const certNumber = params.get("cert");

    function formatDate(value) {
        if (!value) return "Not available";
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleDateString();
    }

    function setBanner(valid, message) {
        const banner = document.getElementById("verifyBanner");
        const text = document.getElementById("verifyBannerText");
        banner.classList.toggle("verify-banner--error", !valid);
        banner.querySelector(".verify-banner__icon").textContent = valid ? "OK" : "!";
        text.textContent = message;
    }

    function renderError(message) {
        setBanner(false, "Verification failed");
        document.getElementById("verifyRoot").innerHTML = `
            <div class="verify-error">
                <div class="verify-eyebrow">Certificate Check</div>
                <h1 class="verify-title">Unable to verify</h1>
                <p class="verify-copy">${message}</p>
                <div class="verify-actions">
                    <a class="btn" href="/">Go to Home</a>
                    <button class="btn-outline" type="button" onclick="window.location.reload()">Try Again</button>
                </div>
            </div>
        `;
    }

    function renderCertificate(cert) {
        setBanner(true, "Certificate verified successfully");
        document.getElementById("verifyRoot").innerHTML = `
            <div class="verify-eyebrow">Verified Donation Record</div>
            <h1 class="verify-title">${cert.donorName || "Verified donor"}</h1>
            <p class="verify-copy">
                This certificate is a valid BloodCare donation record and has passed the public verification check.
            </p>

            <section class="verify-grid">
                <article class="verify-item">
                    <div class="verify-label">Certificate Number</div>
                    <div class="verify-value">${cert.certificateNumber || "Not available"}</div>
                </article>
                <article class="verify-item">
                    <div class="verify-label">Hospital</div>
                    <div class="verify-value">${cert.hospitalName || "Not available"}</div>
                </article>
                <article class="verify-item">
                    <div class="verify-label">Donation Date</div>
                    <div class="verify-value">${formatDate(cert.donationDate)}</div>
                </article>
                <article class="verify-item">
                    <div class="verify-label">Units Donated</div>
                    <div class="verify-value">${cert.units || 0} unit(s)</div>
                </article>
                <article class="verify-item">
                    <div class="verify-label">Blood Group</div>
                    <div class="verify-value">${cert.bloodGroup || "Not available"}</div>
                </article>
                <article class="verify-item">
                    <div class="verify-label">Issued On</div>
                    <div class="verify-value">${formatDate(cert.createdDate)}</div>
                </article>
            </section>

            <div class="verify-note">
                Verified through BloodCare public certificate validation. If any printed details do not match this page, treat the document as invalid.
            </div>

            <div class="verify-actions">
                <a class="btn" href="/">Back to Home</a>
                <button class="btn-outline" type="button" onclick="window.print()">Print</button>
            </div>
        `;
    }

    if (!certNumber) {
        renderError("No certificate code was provided. Please scan a valid QR code or open a valid verification link.");
    } else {
        fetch(`/api/certificate/verify/${encodeURIComponent(certNumber)}`)
            .then(async (response) => {
                const payload = await response.json().catch(() => ({}));
                if (!response.ok || payload.success === false) {
                    throw new Error(payload.message || "The certificate could not be verified.");
                }
                return payload;
            })
            .then(renderCertificate)
            .catch((error) => {
                renderError(error.message || "The certificate could not be verified.");
            });
    }
</script>
</body>
</html>
