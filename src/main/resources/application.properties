# =========================
# GOOGLE OAUTH
# =========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
# Use the forwarded/public base URL by default. This avoids redirect mismatches
# when the app is deployed behind Render/proxies, while still allowing an
# explicit override through GOOGLE_REDIRECT_URI when needed.
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

