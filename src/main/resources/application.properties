spring.application.name=BloodCare

server.port=${PORT:8080}

server.forward-headers-strategy=framework

app.base-url=${APP_BASE_URL:https://bloodcare-3stc.onrender.com}

app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080,https://bloodcare-3stc.onrender.com}

# =========================
# GOOGLE OAUTH
# =========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}

spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

# =========================
# MYSQL DATABASE CONFIG
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}

spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.sql.init.mode=never

# =====================
# EMAIL CONFIG (GMAIL)
# =====================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}

spring.mail.port=${SPRING_MAIL_PORT:587}

spring.mail.username=${SPRING_MAIL_USERNAME:}

spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.transport.protocol=smtp

spring.mail.properties.mail.smtp.auth=true

spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_HOST:smtp.gmail.com}

spring.mail.properties.mail.smtp.connectiontimeout=5000

spring.mail.properties.mail.smtp.timeout=5000

spring.mail.properties.mail.smtp.writetimeout=5000
